name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prompts/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/publish.yml'

permissions:
  id-token: write  # Required for OIDC trusted publisher
  contents: write  # Required to push the version bump commit

jobs:
  publish:
    runs-on: ubuntu-latest

    # Skip the version-bump commit itself to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # [minor] or [major] in commit message controls the bump, otherwise patch
      - name: Bump version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q '\[major\]'; then BUMP=major
          elif echo "$MSG" | grep -q '\[minor\]'; then BUMP=minor
          else BUMP=patch
          fi
          npm version $BUMP -m "chore: release v%s [skip ci]"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Upload npm logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/

      - name: Push version commit
        run: git push --follow-tags
